<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weather App</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0d1117;
    font-family: 'DM Mono', monospace;
    color: #e6edf3;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    margin-bottom: 2rem;
    color: #58a6ff;
    letter-spacing: -0.5px;
  }
  .search-box {
    display: flex; gap: 0.75rem;
    width: 100%; max-width: 480px;
    margin-bottom: 2rem;
  }
  input {
    flex: 1;
    padding: 0.85rem 1.2rem;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #58a6ff; }
  input::placeholder { color: #484f58; }
  button {
    padding: 0.85rem 1.5rem;
    background: #238636;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #2ea043; }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 2.5rem;
    width: 100%; max-width: 480px;
    text-align: center;
    display: none;
  }
  .card.show { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .city-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    margin-bottom: 0.25rem;
  }
  .country { color: #8b949e; font-size: 0.8rem; margin-bottom: 1.5rem; }
  .temp {
    font-family: 'Syne', sans-serif;
    font-size: 4rem;
    font-weight: 800;
    color: #58a6ff;
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  .desc { text-transform: capitalize; color: #8b949e; font-size: 0.85rem; margin-bottom: 2rem; }
  .weather-icon { font-size: 3.5rem; margin-bottom: 1rem; }
  .details {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
    border-top: 1px solid #21262d;
    padding-top: 1.5rem;
  }
  .detail-val {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: #e6edf3;
  }
  .detail-label { font-size: 0.65rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.2rem; }
  .error { color: #f85149; font-size: 0.85rem; margin-top: -1rem; margin-bottom: 1rem; display: none; }
  .error.show { display: block; }
</style>
</head>
<body>
<h1>🌤 Weather App</h1>
<div class="search-box">
  <input type="text" id="cityInput" placeholder="Enter city name..." />
  <button onclick="getWeather()">Search</button>
</div>
<div class="error" id="error">❌ City not found. Check spelling and try again.</div>
<div class="card" id="card">
  <div class="weather-icon" id="icon">⛅</div>
  <div class="city-name" id="cityName">—</div>
  <div class="country" id="country">—</div>
  <div class="temp" id="temp">—°C</div>
  <div class="desc" id="desc">—</div>
  <div class="details">
    <div class="detail-box">
      <div class="detail-val" id="humidity">—</div>
      <div class="detail-label">Humidity</div>
    </div>
    <div class="detail-box">
      <div class="detail-val" id="wind">—</div>
      <div class="detail-label">Wind km/h</div>
    </div>
    <div class="detail-box">
      <div class="detail-val" id="feels">—</div>
      <div class="detail-label">Feels Like</div>
    </div>
  </div>
</div>
<script>
  const API_KEY = "856e19866a6c9cf601c29eb95df49fe7";
  const weatherIcons = {
    "Clear": "☀️", "Clouds": "☁️", "Rain": "🌧️",
    "Drizzle": "🌦️", "Thunderstorm": "⛈️", "Snow": "❄️",
    "Mist": "🌫️", "Fog": "🌫️", "Haze": "🌫️"
  };
  document.getElementById("cityInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") getWeather();
  });
  async function getWeather() {
    const city = document.getElementById("cityInput").value.trim();
    if (!city) return;
    const errorEl = document.getElementById("error");
    const card = document.getElementById("card");
    errorEl.classList.remove("show");
    card.classList.remove("show");
    try {
      const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`);
      if (!res.ok) throw new Error("City not found");
      const data = await res.json();
      showData(data);
    } catch { errorEl.classList.add("show"); }
  }
  function showData(data) {
    const main = data.weather[0].main;
    document.getElementById("icon").textContent = weatherIcons[main] || "🌡️";
    document.getElementById("cityName").textContent = data.name;
    document.getElementById("country").textContent = data.sys.country;
    document.getElementById("temp").textContent = `${Math.round(data.main.temp)}°C`;
    document.getElementById("desc").textContent = data.weather[0].description;
    document.getElementById("humidity").textContent = `${data.main.humidity}%`;
    document.getElementById("wind").textContent = `${Math.round(data.wind.speed * 3.6)}`;
    document.getElementById("feels").textContent = `${Math.round(data.main.feels_like)}°C`;
    document.getElementById("card").classList.add("show");
  }
</script>
</body>
</html>
